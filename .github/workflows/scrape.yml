name: Daily Footywire Mirror

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Playwright + Browsers
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scraper with Xvfb
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node mirror/scrape.js

      - name: Commit updated mirror files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add mirror/*.html
          git commit -m "Daily update" || echo "No changes to commit"
          git push
